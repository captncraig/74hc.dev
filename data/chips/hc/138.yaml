name: "74HC138"
title: "3-to-8 Line Decoder/Demultiplexer"
description: |
  The 74HC138 is a high-speed CMOS 3-to-8 line decoder/demultiplexer. It accepts a
  3-bit binary address on inputs A0–A2 and activates one of eight active-low outputs
  (Y0–Y7). Three enable inputs (E1, E2 active-low, E3 active-high) allow cascading
  and easy expansion to larger decoders.

package: DIP-16
vcc: 5.0
vcc_min: 2.0
vcc_max: 6.0
datasheet: "https://www.ti.com/lit/ds/symlink/cd74hc138.pdf"

pins:
  - number: 1
    name: A0
    type: input
    description: Address input bit 0 (LSB)
  - number: 2
    name: A1
    type: input
    description: Address input bit 1
  - number: 3
    name: A2
    type: input
    description: Address input bit 2 (MSB)
  - number: 4
    name: "~E1"
    type: enable
    description: Enable input 1, active low
  - number: 5
    name: "~E2"
    type: enable
    description: Enable input 2, active low
  - number: 6
    name: E3
    type: enable
    description: Enable input 3, active high
  - number: 7
    name: "~Y7"
    type: output
    description: Output 7, active low
  - number: 8
    name: GND
    type: power
    description: Ground
  - number: 9
    name: "~Y6"
    type: output
    description: Output 6, active low
  - number: 10
    name: "~Y5"
    type: output
    description: Output 5, active low
  - number: 11
    name: "~Y4"
    type: output
    description: Output 4, active low
  - number: 12
    name: "~Y3"
    type: output
    description: Output 3, active low
  - number: 13
    name: "~Y2"
    type: output
    description: Output 2, active low
  - number: 14
    name: "~Y1"
    type: output
    description: Output 1, active low
  - number: 15
    name: "~Y0"
    type: output
    description: Output 0, active low (selected when A=000)
  - number: 16
    name: VCC
    type: power
    description: Supply voltage

